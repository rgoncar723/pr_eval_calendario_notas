<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Notas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1 id="titulo-mes">Notas de...</h1>
        <a href="index.html" class="btn-volver">← Volver al calendario</a>
    </header>

    <main>
        <section id="seccion-formulario">
            <h2 id="form-subtitulo">Nueva Nota</h2>
            <form id="form-nota">
                <input type="hidden" id="nota-id">
                
                <div class="campo">
                    <label for="titulo">Título:</label>
                    <input type="text" id="titulo" placeholder="Ej: Cita médica">
                </div>

                <div class="campo">
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" placeholder="Detalles de la nota..."></textarea>
                </div>

                <div class="campo">
                    <label for="dia">Día (opcional):</label>
                    <input type="number" id="dia" min="1" max="31">
                </div>

                <button type="submit" id="btn-guardar">Guardar Nota</button>
                
                <p id="error-msg" class="error-hidden"></p>
            </form>
        </section>

        <hr>

        <section id="seccion-listado">
            <h2>Mis Notas</h2>
            <div id="contenedor-notas">
                <p class="msg-vacio">No hay notas para este mes.</p>
            </div>
        </section>
    </main>

    <script src="js/app_mes.js"></script>
</body>
</html>
