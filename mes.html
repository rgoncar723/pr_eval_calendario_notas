<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Notas - Mes</title>
    <link rel="stylesheet" href="css/styles.css">
    
</head>
<body>

    <header>
        <h1 id="titulo-mes">Notas de...</h1>
        <a href="index.html" class="btn-volver">← Volver al calendario</a>
    </header>

    <main>
        <section id="seccion-formulario">
            <h2 id="form-subtitulo">Nueva / Editar Nota</h2>
            
            <form id="form-nota">
                <input type="hidden" id="nota-id">
                
                <div class="campo">
                    <label for="titulo">Título:</label>
                    <input type="text" id="titulo" placeholder="Ej: Cita médica" required>
                </div>

                <div class="campo">
                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" placeholder="Detalles de la nota..." required></textarea>
                </div>

                <button type="submit" id="btn-guardar">Guardar Nota</button>
                
                <p id="error-msg" style="color: red; display: none;"></p>
            </form>
        </section>

        <hr>

        <section id="seccion-listado">
            <h2>Mis Notas</h2>
            <div class="notas-mes">
                <p class="msg-vacio">Cargando notas...</p>
            </div>
        </section>
    </main>
    <script src="js/app_mes.js"></script>
</body>
</html>
