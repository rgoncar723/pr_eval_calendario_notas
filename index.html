<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="stylesheet" href="styles.css" />
      <script src="app_index.js" defer></script>
      <title>Calendario de notas</title>
   </head>
    <body>
        <h1 id="init">Calendario de notas</h1>
        <p>Año 2026</p>
        <div id="calendar">
            <div class="month">
                <h2>Enero</h2>
            </div>
            <div class="month">
                <h2>Febrero</h2>
            </div>
            <div class="month">
                <h2>Marzo</h2>
            </div>
            <div class="month">
                <h2>Abril</h2>
            </div>
            <div class="month">
                <h2>Mayo</h2>
            </div>
            <div class="month">
                <h2>Junio</h2>
            </div>
            <div class="month">
                <h2>Julio</h2>
            </div>
            <div class="month">
                <h2>Agosto</h2>
            </div>
            <div class="month">
                <h2>Septiembre</h2>
            </div>
            <div class="month">
                <h2>Octubre</h2>
            </div>
            <div class="month">
                <h2>Noviembre</h2>
            </div>
            <div class="month">
                <h2>Diciembre</h2>
            </div>
        </div>
    </body>
</html>
